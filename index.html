<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ultimate 10K Series</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0a0a0a;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:white;
color:black;
position:fixed;
width:100%;
top:0;
z-index:1000;
}

.logo{
font-weight:bold;
font-size:20px;
}

.right-menu{
display:flex;
gap:20px;
align-items:center;
}

.daftar{
background:red;
padding:10px 18px;
border-radius:8px;
color:white;
text-decoration:none;
font-weight:bold;
}

/* HERO */

.hero{
height:100vh;
background:url("hero.jpg") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding-top:80px;
}

.hero h1{
font-size:55px;
}

.hero p{
margin-top:10px;
font-size:18px;
}

/* SECTION */

.section{
padding:80px 20px;
text-align:center;
}

.section h2{
font-size:32px;
margin-bottom:40px;
}

/* EVENT CARD */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
max-width:1100px;
margin:auto;
}

.card{
background:#111;
border-radius:15px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.card-content h3{
font-size:20px;
}

.card-content p{
color:#bbb;
margin:5px 0;
}

.card button{
background:red;
border:none;
padding:8px 14px;
color:white;
border-radius:6px;
cursor:pointer;
}

/* Price List */

.map{
max-width:900px;
margin:auto;
}

.map img{
width:100%;
border-radius:15px;
}

/* FORM */

form{
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
gap:12px;
}

input,select{
padding:10px;
border-radius:6px;
border:none;
}

button.submit{
background:red;
border:none;
padding:12px;
color:white;
font-weight:bold;
border-radius:8px;
}

/* FOOTER */

footer{
text-align:center;
padding:40px;
background:black;
color:#aaa;
}

</style>
</head>

<body>

<header>

<div class="logo">Ultimate 10K Series</div>

<div class="right-menu">
<span>ENG | ID</span>
<a class="daftar" href="#register">DAFTAR</a>
</div>

</header>

<section class="hero">

<div>
<h1>THE ULTIMATE<br>10K SERIES</h1>
<p>Indonesia Running Event</p>
</div>

</section>

<section class="section">

<h2>Event Cities</h2>

<div class="cards">

<div class="card">
<img src="bandung.jpg">
<div class="card-content">
<h3>Bandung 10K</h3>
<p>West Java</p>
<button>Detail</button>
</div>
</div>

<div class="card">
<img src="surabaya.jpg">
<div class="card-content">
<h3>Surabaya 10K</h3>
<p>East Java</p>
<button>Detail</button>
</div>
</div>

<div class="card">
<img src="tangerang.jpg">
<div class="card-content">
<h3>Tangerang 10K</h3>
<p>Banten</p>
<button>Detail</button>
</div>
</div>

<div class="card">
<img src="semarang.jpg">
<div class="card-content">
<h3>Semarang 10K</h3>
<p>Central Java</p>
<button>Detail</button>
</div>
</div>

</div>

</section>

<section class="section">

<h2>Price List</h2>

<div class="List">
<img src="Price.jpg">
</div>

</section>

<section class="section" id="register">

<h2>Pendaftaran Pelari</h2>

<form>

<input type="text" placeholder="Nama Lengkap" required>

<input type="email" placeholder="Email" required>

<input type="tel" placeholder="Nomor WhatsApp" required>

<select>
<option>Pilih Kota Event</option>
<option>Bandung 10K</option>
<option>Surabaya 10K</option>
<option>Tangerang 10K</option>
<option>Semarang 10K</option>
</select>

<select>
<option>Kategori Lomba</option>
<option>10K Open</option>
<option>10K Master</option>
<option>10K Nasional</option>
</select>

<button class="submit">Daftar Sekarang</button>

</form>

</section>

<footer>

<p>© 2026 Ultimate 10K Series Indonesia</p>

</footer>

</body>
</html>
